<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>JD Order Exporter</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        width: 340px;
        margin: 0;
        padding: 14px;
        color: #1f2933;
        background: #f7f8fa;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 16px;
        font-weight: 650;
      }

      label {
        display: block;
        margin: 10px 0 4px;
        font-size: 12px;
        color: #52606d;
      }

      select,
      input[type="number"] {
        box-sizing: border-box;
        width: 100%;
        height: 32px;
        border: 1px solid #d9e2ec;
        border-radius: 6px;
        padding: 0 8px;
        background: white;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .check {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
        font-size: 13px;
        color: #243b53;
      }

      button {
        width: 100%;
        height: 34px;
        margin-top: 12px;
        border: 0;
        border-radius: 6px;
        color: white;
        background: #d92d20;
        font-weight: 650;
        cursor: pointer;
      }

      button.secondary {
        background: #52606d;
      }

      button:disabled {
        cursor: default;
        opacity: 0.55;
      }

      #statusText {
        min-height: 34px;
        margin-top: 10px;
        font-size: 12px;
        line-height: 1.45;
        color: #52606d;
      }
    </style>
  </head>
  <body>
    <h1>京东订单本地导出</h1>

    <label for="dateMode">日期范围</label>
    <select id="dateMode">
      <option value="full">全量：今年 + 历年 + 2014以前</option>
      <option value="currentYear">今年内订单</option>
      <option value="recent3m">近三个月订单</option>
      <option value="customYears">自定义年份范围</option>
    </select>

    <div class="row" id="yearRow">
      <div>
        <label for="startYear">开始年份</label>
        <input id="startYear" type="number" min="2014" step="1">
      </div>
      <div>
        <label for="endYear">结束年份</label>
        <input id="endYear" type="number" min="2014" step="1">
      </div>
    </div>

    <label for="orderStatus">订单状态</label>
    <select id="orderStatus">
      <option value="4096">全部状态</option>
      <option value="1024">已完成</option>
      <option value="-1">已取消</option>
      <option value="128">等待收货</option>
      <option value="1">等待付款</option>
    </select>

    <div class="row">
      <div>
        <label for="delayMs">请求间隔 ms</label>
        <input id="delayMs" type="number" min="300" step="100" value="1000">
      </div>
      <div>
        <label for="maxPages">每段最多页</label>
        <input id="maxPages" type="number" min="1" step="1" placeholder="不限">
      </div>
    </div>

    <label class="check">
      <input id="includeDetails" type="checkbox" checked>
      补充详情页字段
    </label>

    <label class="check">
      <input id="maskSensitive" type="checkbox" checked>
      导出时脱敏收货信息
    </label>

    <button id="start">开始导出</button>
    <button id="stop" class="secondary">停止当前导出</button>
    <div id="statusText"></div>

    <script src="popup.js"></script>
  </body>
</html>
