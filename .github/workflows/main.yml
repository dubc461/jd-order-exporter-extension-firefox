  name: Build Extensions

  on:
    workflow_dispatch:
    push:
      tags:
        - "v*"

  jobs:
    build-extensions:
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: "22"

        - name: Lint extension
          run: npx --yes web-ext lint --source-dir .

        - name: Build Chrome ZIP
          run: |
            mkdir -p web-ext-artifacts
            zip -r web-ext-artifacts/jd-order-exporter-chrome.zip \
              manifest.json \
              background.js \
              content.js \
              popup.html \
              popup.js \
              README.md \
              PRIVACY.md \
              LICENSE

        - name: Sign Firefox XPI
          run: |
            npx --yes web-ext sign \
              --source-dir . \
              --channel=unlisted \
              --api-key "$AMO_JWT_ISSUER" \
              --api-secret "$AMO_JWT_SECRET"
          env:
            AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
            AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}

        - name: Upload Chrome ZIP
          uses: actions/upload-artifact@v4
          with:
            name: chrome-extension-zip
            path: web-ext-artifacts/jd-order-exporter-chrome.zip

        - name: Upload Firefox signed XPI
          uses: actions/upload-artifact@v4
          with:
            name: firefox-signed-xpi
            path: web-ext-artifacts/*.xpi
