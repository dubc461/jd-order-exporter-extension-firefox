name: Build Extensions

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-extensions:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Lint extension
        run: npx --yes web-ext lint --source-dir .

      - name: Build Chrome ZIP
        run: |
          mkdir -p web-ext-artifacts
          zip -r web-ext-artifacts/jd-order-exporter-chrome.zip \
            manifest.json \
            background.js \
            content.js \
            popup.html \
            popup.js \
            README.md \
            PRIVACY.md \
            LICENSE

      - name: Sign Firefox XPI
        run: |
          npx --yes web-ext sign \
            --source-dir . \
            --channel=unlisted \
            --api-key "$AMO_JWT_ISSUER" \
            --api-secret "$AMO_JWT_SECRET"
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-packages
          path: |
            web-ext-artifacts/jd-order-exporter-chrome.zip
            web-ext-artifacts/*.xpi

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              web-ext-artifacts/jd-order-exporter-chrome.zip \
              web-ext-artifacts/*.xpi \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              web-ext-artifacts/jd-order-exporter-chrome.zip \
              web-ext-artifacts/*.xpi \
              --title "$GITHUB_REF_NAME" \
              --notes "Chrome ZIP and signed Firefox XPI."
          fi
