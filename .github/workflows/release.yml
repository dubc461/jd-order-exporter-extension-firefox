name: Release

on:
  push:
    branches:
      - main
    paths:
      - manifest.json
      - background.js
      - content.js
      - popup.html
      - popup.js
      - .github/workflows/release.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read extension version
        id: version
        shell: bash
        run: |
          version="$(python3 - <<'PY'
          import json
          with open('manifest.json', encoding='utf-8') as file:
              print(json.load(file)['version'])
          PY
          )"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "asset=jd-order-exporter-local-v$version.zip" >> "$GITHUB_OUTPUT"

      - name: Package extension
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import zipfile
          from pathlib import Path

          version = json.loads(Path('manifest.json').read_text(encoding='utf-8'))['version']
          asset = Path(f'jd-order-exporter-local-v{version}.zip')
          files = [
              'manifest.json',
              'background.js',
              'content.js',
              'popup.html',
              'popup.js',
          ]
          with zipfile.ZipFile(asset, 'w', zipfile.ZIP_DEFLATED) as archive:
              for file_name in files:
                  archive.write(file_name, file_name)
          PY

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          ASSET: ${{ steps.version.outputs.asset }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber
          else
            gh release create "$TAG" "$ASSET" \
              --title "$TAG" \
              --target "$GITHUB_SHA" \
              --notes "Initial release of JD Order Exporter Local."
          fi
